services:
  manametamaori:
    build: .
    container_name: manametamaori
    restart: unless-stopped
    environment:
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-manametamaori-prod-secret-change-me}
      - DB_PATH=/app/data/app.db
    volumes:
      - manametamaori-data:/app/data
      - manametamaori-uploads:/app/public/uploads
    ports:
      - "3080:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.manametamaori.rule=Host(`manametamaori.com`) || Host(`www.manametamaori.com`)"
      - "traefik.http.routers.manametamaori.entrypoints=websecure"
      - "traefik.http.routers.manametamaori.tls.certresolver=letsencrypt"
      - "traefik.http.routers.manametamaori-http.rule=Host(`manametamaori.com`) || Host(`www.manametamaori.com`)"
      - "traefik.http.routers.manametamaori-http.entrypoints=web"
      - "traefik.http.routers.manametamaori-http.middlewares=manametamaori-redirect"
      - "traefik.http.middlewares.manametamaori-redirect.redirectscheme.scheme=https"
      - "traefik.http.services.manametamaori.loadbalancer.server.port=3000"

volumes:
  manametamaori-data:
  manametamaori-uploads:
